      Glossary:
        config:
          dir: services/glossary/sdkmocks
  github.com/Smartling/smartling-cli/cmd/files:
    interfaces:
      SrvInitializer:
        config:
          dir: cmd/files/mocks
  github.com/Smartling/smartling-cli/cmd/projects:
    interfaces:
      SrvInitializer:
        config:
          dir: cmd/projects/mocks
  github.com/Smartling/smartling-cli/cmd/init:
    interfaces:
      SrvInitializer:
        config:
          dir: cmd/init/mocks
  github.com/Smartling/smartling-cli/cmd/mt:
    interfaces:
      SrvInitializer:
        config:
          dir: cmd/mt/mocks
