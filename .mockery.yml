template: testify
formatter: goimports
pkgname: '{{.SrcPackageName}}mocks'
filename: '{{.SrcPackageName}}.go'
template-data:
  unroll-variadic: true
packages:
  github.com/Smartling/smartling-cli/services/files:
    interfaces:
      Service:
        config:
          dir: services/files/mocks
  github.com/Smartling/smartling-cli/services/projects:
    interfaces:
      Service:
        config:
          dir: services/projects/mocks
  github.com/Smartling/smartling-cli/services/init:
    interfaces:
      Service:
        config:
          dir: services/init/mocks
  github.com/Smartling/smartling-cli/services/mt:
    interfaces:
      Service:
        config:
          dir: services/mt/mocks
  github.com/Smartling/smartling-cli/services/jobs:
    interfaces:
      Service:
        config:
          dir: services/jobs/mocks
  github.com/Smartling/api-sdk-go/api/job:
    interfaces:
      Job:
        config:
          dir: services/jobs/sdkmocks
  github.com/Smartling/api-sdk-go/api/job/locale:
    interfaces:
      JobLocale:
        config:
          dir: services/jobs/locales/sdkmocks
  github.com/Smartling/api-sdk-go/api/job/string:
    interfaces:
      JobString:
        config:
          dir: services/jobs/strings/sdkmocks
  github.com/Smartling/api-sdk-go/api/job/file:
